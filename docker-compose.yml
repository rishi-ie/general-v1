version: "3.9"

services:
  superhive:
    build:
      context .
      dockerfile Dockerfile
    container_name: superhive
    environment:
      - SUPERHIVE_API_KEY=${SUPERHIVE_API_KEY:-}
      - SUPERHIVE_LOG_LEVEL=info
      - PI_CODING_AGENT_DIR=/app/meta-agent/meta-agent-config
      - PI_CODING_AGENT_SESSION_DIR=/root/.pi/agent/sessions
      - PI_SKIP_VERSION_CHECK=1
      - PI_OFFLINE=${PI_OFFLINE:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
    volumes:
      - superhive-data:/root/.superhive
      - superhive-sessions:/root/.pi/agent/sessions
    working_dir: /app
    ports:
      - "7711:7711"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7711/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  superhive-data:
  superhive-sessions:
